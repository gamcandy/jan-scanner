<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JANスキャナー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #1D9E75; --accent-light: #E1F5EE; --accent-dark: #085041;
  --danger: #D85A30; --danger-light: #FAECE7;
  --warn: #BA7517; --warn-light: #FAEEDA;
  --bg: #f5f5f3; --bg-card: #ffffff;
  --text: #1a1a18; --text-sub: #6b6b68; --text-hint: #aaa;
  --border: rgba(0,0,0,0.10); --border-md: rgba(0,0,0,0.18);
  --r: 12px; --r-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a18; --bg-card: #252523;
    --text: #f0f0ee; --text-sub: #aaa; --text-hint: #555;
    --border: rgba(255,255,255,0.10); --border-md: rgba(255,255,255,0.18);
    --accent-light: #04342C; --accent-dark: #9FE1CB;
    --danger-light: #4A1B0C; --warn-light: #412402;
  }
}
html, body { height: 100%; background: var(--bg); font-family: -apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif; color: var(--text); }
#app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom,16px); }

/* ヘッダー */
.hdr { background: var(--accent); padding: 13px 16px; display: flex; align-items: center; gap: 9px; }
.hdr h1 { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: .02em; }

/* 非対応バナー */
#no-support { display:none; margin:10px 12px 0; background:var(--warn-light); border-radius:var(--r-sm); padding:11px 14px; font-size:13px; color:var(--warn); line-height:1.7; }
#no-support strong { display:block; font-size:14px; margin-bottom:3px; }

/* カメラ */
#viewer { background:#000; width:100%; height:230px; position:relative; overflow:hidden; display:none; }
#preview { width:100%; height:100%; object-fit:cover; display:block; }
.scan-line { position:absolute; left:10%; right:10%; top:50%; height:2px; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:scan 1.8s ease-in-out infinite; }
@keyframes scan { 0%{top:20%} 50%{top:80%} 100%{top:20%} }
.corner { position:absolute; width:24px; height:24px; border-color:var(--accent); border-style:solid; }
.tl{top:16px;left:10%;border-width:3px 0 0 3px} .tr{top:16px;right:10%;border-width:3px 3px 0 0}
.bl{bottom:16px;left:10%;border-width:0 0 3px 3px} .br{bottom:16px;right:10%;border-width:0 3px 3px 0}

#placeholder { width:100%; height:230px; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#888; font-size:13px; }
#placeholder svg { width:38px; height:38px; }

/* パーミッションエラー */
#perm-error { display:none; margin:8px 12px 0; background:var(--danger-light); border-radius:var(--r-sm); padding:11px 14px; font-size:13px; color:var(--danger); line-height:1.7; }
#perm-error strong { display:block; font-size:14px; margin-bottom:4px; }
.perm-steps { margin:3px 0 6px 15px; }
.perm-steps li { margin-bottom:2px; }
.close-err { background:var(--danger); color:#fff; border:none; border-radius:var(--r-sm); font-size:12px; padding:5px 10px; cursor:pointer; margin-top:4px; }

/* コントロール */
.ctrl { display:flex; gap:8px; padding:10px 12px; background:var(--bg-card); border-bottom:0.5px solid var(--border); }
.btn-green { flex:1; padding:10px 0; background:var(--accent); color:#fff; border:none; border-radius:var(--r-sm); font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn-green:active { opacity:.85; }
.btn-gray { flex:1; padding:10px 0; background:var(--bg); color:var(--text-sub); border:0.5px solid var(--border-md); border-radius:var(--r-sm); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

/* 結果 */
.result-row { margin:10px 12px 0; background:var(--accent-light); border-radius:var(--r-sm); padding:9px 14px; display:flex; align-items:center; gap:10px; min-height:42px; }
#result-text { font-size:15px; font-weight:600; color:var(--accent-dark); letter-spacing:.04em; word-break:break-all; }

/* フォーム */
.form { padding:10px 12px; background:var(--bg-card); border-top:0.5px solid var(--border); margin-top:10px; }
.form-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.form-row label { font-size:12px; color:var(--text-sub); width:52px; flex-shrink:0; }
.form-row input { flex:1; padding:8px 10px; border:0.5px solid var(--border-md); border-radius:var(--r-sm); font-size:15px; background:var(--bg); color:var(--text); -webkit-appearance:none; }
.form-row input:focus { outline:2px solid var(--accent); outline-offset:1px; }
.add-btn { width:100%; margin-top:2px; padding:11px; background:var(--accent); color:#fff; border:none; border-radius:var(--r-sm); font-size:15px; font-weight:600; cursor:pointer; }
.add-btn:active { opacity:.85; }

/* リスト */
.list-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 12px 6px; border-top:0.5px solid var(--border); margin-top:4px; }
.list-label { font-size:13px; color:var(--text-sub); display:flex; align-items:center; gap:6px; }
.badge { background:var(--accent-light); color:var(--accent-dark); border-radius:100px; font-size:11px; font-weight:600; padding:1px 8px; }
.csv-btn { padding:6px 12px; background:var(--bg-card); border:0.5px solid var(--border-md); border-radius:var(--r-sm); font-size:13px; color:var(--accent); cursor:pointer; display:flex; align-items:center; gap:4px; }
.csv-btn:disabled { color:var(--text-hint); cursor:default; }
.tbl-wrap { padding:0 12px 24px; overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; table-layout:fixed; }
th { text-align:left; padding:5px 4px; color:var(--text-sub); border-bottom:0.5px solid var(--border); font-weight:600; font-size:11px; }
td { padding:7px 4px; border-bottom:0.5px solid var(--border); vertical-align:middle; }
th:nth-child(1),td:nth-child(1){width:26%}
th:nth-child(2),td:nth-child(2){width:34%;font-family:monospace;font-size:11px;word-break:break-all}
th:nth-child(3),td:nth-child(3){width:17%}
th:nth-child(4),td:nth-child(4){width:13%}
th:nth-child(5),td:nth-child(5){width:10%;text-align:center}
.del-btn { background:none; border:none; color:var(--danger); cursor:pointer; font-size:18px; padding:2px; }
.empty { text-align:center; padding:20px 0 10px; color:var(--text-hint); font-size:13px; }
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="7" width="3" height="10"/><rect x="7" y="7" width="1" height="10"/>
      <rect x="9" y="7" width="2" height="10"/><rect x="13" y="7" width="1" height="10"/>
      <rect x="16" y="7" width="2" height="10"/><rect x="20" y="7" width="1" height="10"/>
    </svg>
    <h1>JANスキャナー</h1>
  </div>

  <div id="no-support">
    <strong>⚠ バーコード自動読み取りに非対応です</strong>
    Android Chrome 84以降が必要です。JANコードは手入力でご利用ください。
  </div>

  <div id="viewer">
    <video id="preview" autoplay playsinline muted></video>
    <div style="position:absolute;inset:0;pointer-events:none">
      <div class="scan-line"></div>
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
  </div>

  <div id="placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round">
      <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
      <circle cx="12" cy="13" r="3"/>
    </svg>
    <span>カメラを起動してスキャン</span>
  </div>

  <div id="perm-error">
    <strong>📵 カメラへのアクセスが拒否されました</strong>
    以下の手順で許可してください：
    <ol class="perm-steps">
      <li>アドレスバー左の 🔒 をタップ</li>
      <li>「権限」→「カメラ」→「許可」に変更</li>
      <li>ページを再読み込みして再度「カメラ起動」</li>
    </ol>
    <button class="close-err" onclick="document.getElementById('perm-error').style.display='none'">✕ 閉じる</button>
  </div>

  <div class="ctrl">
    <button class="btn-green" id="startBtn" onclick="カメラ起動()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
      カメラ起動
    </button>
    <button class="btn-gray" id="stopBtn" onclick="カメラ停止()" style="display:none">■ 停止</button>
  </div>

  <div class="result-row">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="7" width="3" height="10"/><rect x="7" y="7" width="1" height="10"/>
      <rect x="9" y="7" width="2" height="10"/><rect x="13" y="7" width="1" height="10"/>
      <rect x="16" y="7" width="2" height="10"/><rect x="20" y="7" width="1" height="10"/>
    </svg>
    <span id="result-text">読み取り待機中...</span>
  </div>

  <div class="form">
    <div class="form-row">
      <label>JAN</label>
      <input type="text" id="janInput" placeholder="スキャンまたは直接入力" maxlength="13" inputmode="numeric">
    </div>
    <div class="form-row">
      <label>売価（円）</label>
      <input type="number" id="priceInput" placeholder="例: 198" min="0" step="1" inputmode="decimal">
    </div>
    <div class="form-row">
      <label>F数</label>
      <input type="number" id="fInput" placeholder="例: 2.5" min="0" step="0.01" inputmode="decimal">
    </div>
    <button class="add-btn" onclick="リスト追加()">＋ リストに追加</button>
  </div>

  <div class="list-hdr">
    <div class="list-label">スキャン一覧 <span class="badge" id="countBadge">0件</span></div>
    <button class="csv-btn" id="csvBtn" onclick="CSV保存()" disabled>↓ CSV保存</button>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr><th>日付</th><th>JANコード</th><th>売価(円)</th><th>F数</th><th></th></tr></thead>
      <tbody id="listBody"><tr><td colspan="5" class="empty">まだデータがありません</td></tr></tbody>
    </table>
  </div>

</div>
<script>
/* ════════════════════════════════
   状態変数
════════════════════════════════ */
var スキャンデータ = [];
var ストリーム = null;
var スキャン中 = false;
var スキャンループID = null;
var 最終コード = '';
var 最終コード時刻 = 0;
var detector = null;

/* ════════════════════════════════
   サブ：BarcodeDetector初期化
   戻り値: Promise<BarcodeDetector|null>
════════════════════════════════ */
function detector初期化() {
  if (!('BarcodeDetector' in window)) return Promise.resolve(null);
  return BarcodeDetector.getSupportedFormats().then(function(fmts) {
    if (fmts.indexOf('ean_13') === -1) return null;
    return new BarcodeDetector({ formats: ['ean_13'] });
  }).catch(function() { return null; });
}

/* ════════════════════════════════
   サブ：日付文字列取得
   戻り値: string "YYYY-MM-DD"
════════════════════════════════ */
function 日付文字列取得() {
  var d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

/* ════════════════════════════════
   サブ：スキャンループ（requestAnimationFrame）
   入力: video要素
   副作用: JANフィールド更新
════════════════════════════════ */
function スキャンループ(video) {
  if (!スキャン中) return;
  detector.detect(video).then(function(codes) {
    for (var i = 0; i < codes.length; i++) {
      var c = codes[i];
      if (c.format !== 'ean_13') continue;
      var code = c.rawValue;
      var now = Date.now();
      if (code === 最終コード && now - 最終コード時刻 < 3000) continue;
      最終コード = code;
      最終コード時刻 = now;
      document.getElementById('result-text').textContent = code;
      document.getElementById('janInput').value = code;
      document.getElementById('priceInput').focus();
      break;
    }
  }).catch(function() {
  }).then(function() {
    if (スキャン中) {
      スキャンループID = requestAnimationFrame(function() { スキャンループ(video); });
    }
  });
}

/* ════════════════════════════════
   サブ：テーブル再描画
   副作用: DOM更新
════════════════════════════════ */
function テーブル再描画() {
  document.getElementById('countBadge').textContent = スキャンデータ.length + '件';
  document.getElementById('csvBtn').disabled = スキャンデータ.length === 0;
  var tbody = document.getElementById('listBody');
  if (!スキャンデータ.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">まだデータがありません</td></tr>';
    return;
  }
  tbody.innerHTML = スキャンデータ.map(function(d, i) {
    return '<tr><td>' + d.date + '</td><td>' + d.jan + '</td><td>' +
      d.price.toLocaleString() + '</td><td>' + d.f + '</td>' +
      '<td><button class="del-btn" onclick="行削除(' + i + ')">×</button></td></tr>';
  }).join('');
}

/* ════════════════════════════════
   サブ：CSV文字列生成
   入力: データ配列
   戻り値: BOM付きCSV string
════════════════════════════════ */
function CSV文字列生成(データ) {
  return '\uFEFF日付,JANコード,売価,F数\n' +
    データ.map(function(d) { return [d.date, d.jan, d.price, d.f].join(','); }).join('\n');
}

/* ════════════════════════════════
   サブ：ファイルダウンロード
   入力: 内容string, ファイル名string
   副作用: ブラウザダウンロード
════════════════════════════════ */
function ファイルダウンロード(内容, ファイル名) {
  var blob = new Blob([内容], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = ファイル名;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

/* ════════════════════════════════
   サブ：UI切替（カメラON/OFF）
════════════════════════════════ */
function UI_カメラON() {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'flex';
}
function UI_カメラOFF() {
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('startBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
}

/* ════════════════════════════════
   メイン：初期化
════════════════════════════════ */
detector初期化().then(function(d) {
  detector = d;
  if (!d) document.getElementById('no-support').style.display = 'block';
});

/* ════════════════════════════════
   メイン：カメラ起動
   getUserMedia → video再生 → スキャンループ開始
════════════════════════════════ */
function カメラ起動() {
  if (!detector) {
    alert('このブラウザはBarcodeDetector APIに非対応です。\nJANコードは手入力してください。');
    return;
  }
  document.getElementById('perm-error').style.display = 'none';

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
  }).then(function(stream) {
    ストリーム = stream;
    var video = document.getElementById('preview');
    video.srcObject = stream;
    video.onloadedmetadata = function() {
      video.play().then(function() {
        UI_カメラON();
        スキャン中 = true;
        スキャンループ(video);
      }).catch(function(e) {
        document.getElementById('result-text').textContent = '再生エラー: ' + e.message;
      });
    };
  }).catch(function(err) {
    var name = (err.name || '').toLowerCase();
    var msg  = (err.message || '').toLowerCase();
    if (name === 'notallowederror' || name === 'permissiondeniederror' ||
        msg.indexOf('permission') !== -1 || msg.indexOf('denied') !== -1) {
      document.getElementById('perm-error').style.display = 'block';
      document.getElementById('result-text').textContent = 'カメラへのアクセスが拒否されました';
    } else if (name === 'notfounderror' || name === 'devicenotfounderror') {
      document.getElementById('result-text').textContent = 'カメラが見つかりません';
    } else if (name === 'notreadableerror' || name === 'trackstarterror') {
      document.getElementById('result-text').textContent = 'カメラが他のアプリで使用中です';
    } else {
      document.getElementById('result-text').textContent = 'エラー(' + err.name + '): ' + err.message;
    }
  });
}

/* ════════════════════════════════
   メイン：カメラ停止
   スキャンループ停止 → ストリーム解放 → UI切替
════════════════════════════════ */
function カメラ停止() {
  スキャン中 = false;
  if (スキャンループID) { cancelAnimationFrame(スキャンループID); スキャンループID = null; }
  if (ストリーム) { ストリーム.getTracks().forEach(function(t) { t.stop(); }); ストリーム = null; }
  UI_カメラOFF();
}

/* ════════════════════════════════
   メイン：リスト追加
   入力フォーム → スキャンデータ配列 → テーブル再描画
════════════════════════════════ */
function リスト追加() {
  var jan   = document.getElementById('janInput').value.trim();
  var price = document.getElementById('priceInput').value.trim();
  var f     = document.getElementById('fInput').value.trim();
  if (!jan)   { document.getElementById('janInput').focus(); return; }
  if (!price) { document.getElementById('priceInput').focus(); return; }
  if (!f)     { document.getElementById('fInput').focus(); return; }

  スキャンデータ.push({ date: 日付文字列取得(), jan: jan, price: parseFloat(price), f: parseFloat(f) });
  テーブル再描画();
  ['janInput', 'priceInput', 'fInput'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('result-text').textContent = '追加しました: ' + jan;
  最終コード = '';
  document.getElementById('janInput').focus();
}

/* ════════════════════════════════
   メイン：行削除
   インデックス → スキャンデータ配列 → テーブル再描画
════════════════════════════════ */
function 行削除(idx) {
  スキャンデータ.splice(idx, 1);
  テーブル再描画();
}

/* ════════════════════════════════
   メイン：CSV保存
   スキャンデータ配列 → CSV生成 → ダウンロード
════════════════════════════════ */
function CSV保存() {
  if (!スキャンデータ.length) return;
  ファイルダウンロード(
    CSV文字列生成(スキャンデータ),
    'scan_' + 日付文字列取得().replace(/-/g, '') + '.csv'
  );
}

/* キーボードナビ */
document.getElementById('janInput').addEventListener('keydown',   function(e) { if (e.key === 'Enter') document.getElementById('priceInput').focus(); });
document.getElementById('priceInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('fInput').focus(); });
document.getElementById('fInput').addEventListener('keydown',     function(e) { if (e.key === 'Enter') リスト追加(); });
</script>
</body>
</html>
